<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>积分中心</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #101820; color: #e5edf4; }
  .card { background: #18232e; border: 1px solid #2b3b49; border-radius: 8px; padding: 18px; }
  input, textarea { background: #101820; border: 1px solid #344858; color: #e5edf4; border-radius: 6px; padding: 8px 10px; }
  input:focus, textarea:focus { outline: none; border-color: #4f9cf9; }
  .btn { border: 0; border-radius: 6px; padding: 8px 14px; cursor: pointer; }
  .btn-primary { background: #2f80ed; color: white; }
  .btn-secondary { background: #2b3b49; color: #e5edf4; }
  table { width: 100%; border-collapse: collapse; min-width: 980px; }
  th, td { padding: 10px; border-bottom: 1px solid #263746; text-align: left; font-size: 13px; white-space: nowrap; }
  th { color: #9fb0bf; font-weight: 500; }
  tr.active td { background: #20344a; }
  .table-wrap { overflow-x: auto; }
</style>
</head>
<body>
<div id="login" class="max-w-sm mx-auto mt-28 card" style="display:none">
  <h1 class="text-xl font-bold mb-4">积分中心</h1>
  <input id="pwd" type="password" placeholder="管理员密码" class="w-full mb-3" onkeydown="if(event.key==='Enter')login()">
  <button class="btn btn-primary w-full" onclick="login()">登录</button>
</div>

<div id="app" class="max-w-7xl mx-auto px-4 py-6" style="display:none">
  <div class="flex items-center justify-between mb-5">
    <div>
      <h1 class="text-2xl font-bold">积分中心</h1>
      <p class="text-sm text-slate-400 mt-1">全站共享积分充值、员工生成数量、生成时长和逐条扣费明细</p>
    </div>
    <button class="btn btn-secondary" onclick="loadAll()">刷新</button>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
    <div class="card"><div class="text-sm text-slate-400">使用员工数</div><div class="text-2xl font-bold" id="s-users">-</div></div>
    <div class="card"><div class="text-sm text-slate-400">站点余额</div><div class="text-2xl font-bold text-sky-300" id="s-balance">-</div></div>
    <div class="card"><div class="text-sm text-slate-400">总生成次数</div><div class="text-2xl font-bold" id="s-generations">-</div></div>
    <div class="card"><div class="text-sm text-slate-400">总消耗积分</div><div class="text-2xl font-bold text-amber-300" id="s-consumed">-</div></div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-[1.5fr_1fr] gap-4 mb-5">
    <div class="card">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold">员工使用</h2>
        <input id="user-search" placeholder="搜索用户/邮箱" oninput="renderUsers()" class="w-56">
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>用户</th><th>邮箱</th><th>生成次数</th><th>生成数量</th><th>生成时长</th><th>消耗</th><th>最近生成</th></tr></thead>
          <tbody id="user-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2 class="font-bold mb-1">全站充值</h2>
      <p class="text-sm text-slate-400 mb-3">充值后主站所有员工共用同一个站点余额</p>
      <div class="grid gap-3">
        <label class="text-sm text-slate-400">充值积分<input id="r-amount" type="number" min="0.01" step="0.01" class="block w-full mt-1"></label>
        <label class="text-sm text-slate-400">备注<textarea id="r-note" rows="3" class="block w-full mt-1"></textarea></label>
        <button class="btn btn-primary" onclick="recharge()">确认充值</button>
        <div id="recharge-state" class="text-sm text-slate-400"></div>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-4">
    <div class="card">
      <h2 class="font-bold mb-3" id="usage-title">生成明细</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>时间</th><th>用户</th><th>模型</th><th>模式</th><th>分辨率</th><th>生成时长</th><th>生成数量</th><th>图片</th><th>视频</th><th>状态</th><th>扣费</th><th>任务 ID</th></tr></thead>
          <tbody id="usage-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2 class="font-bold mb-3" id="tx-title">积分流水</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>时间</th><th>用户</th><th>类型</th><th>变动</th><th>变动后余额</th><th>备注</th><th>操作人</th></tr></thead>
          <tbody id="tx-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
let TOKEN = localStorage.getItem('admin_token') || ''
let users = []
let siteSummary = {
  balance: 0,
  userCount: 0,
  generationCount: 0,
  outputCount: 0,
  generatedSeconds: 0,
  consumedCredits: 0,
}
let selectedUserId = ''

function request(path, opts = {}) {
  return fetch(`/api/admin${path}`, {
    ...opts,
    headers: {
      Authorization: `Bearer ${TOKEN}`,
      ...(opts.headers || {}),
    },
  }).then(async (response) => {
    const payload = await response.json().catch(() => ({}))
    if (response.status === 401) {
      showLogin()
      throw new Error('Unauthorized')
    }
    if (!response.ok) throw new Error(payload.error || '请求失败')
    return payload
  })
}

function showLogin() {
  document.getElementById('login').style.display = 'block'
  document.getElementById('app').style.display = 'none'
}

function login() {
  TOKEN = document.getElementById('pwd').value
  localStorage.setItem('admin_token', TOKEN)
  loadAll().then(() => {
    document.getElementById('login').style.display = 'none'
    document.getElementById('app').style.display = 'block'
  }).catch(() => alert('密码错误'))
}

async function loadAll() {
  const [summary, userRows] = await Promise.all([
    request('/credits/site'),
    request('/credits/users'),
  ])
  siteSummary = summary
  users = userRows
  renderSummary()
  renderUsers()
  await loadDetails(selectedUserId)
}

function renderSummary() {
  document.getElementById('s-users').textContent = Number(siteSummary.userCount || 0)
  document.getElementById('s-balance').textContent = fmtCredit(siteSummary.balance)
  document.getElementById('s-generations').textContent = Number(siteSummary.generationCount || 0)
  document.getElementById('s-consumed').textContent = fmtCredit(siteSummary.consumedCredits)
}

function renderUsers() {
  const keyword = document.getElementById('user-search').value.trim().toLowerCase()
  const rows = users.filter((user) => {
    const text = [user.user_id, user.user_email, user.user_nickname, user.user_group].join(' ').toLowerCase()
    return !keyword || text.includes(keyword)
  })
  document.getElementById('user-tbody').innerHTML = rows.map((user) => `
    <tr class="${user.user_id === selectedUserId ? 'active' : ''}" onclick="selectUser('${escAttr(user.user_id)}')">
      <td>${esc(user.user_nickname || user.user_id || '-')}</td>
      <td>${esc(user.user_email || '-')}</td>
      <td>${Number(user.generation_count || 0)}</td>
      <td>${Number(user.output_count || 0)}</td>
      <td>${fmtSeconds(user.generated_seconds)}</td>
      <td>${fmtCredit(user.consumed_credits)}</td>
      <td>${fmtTime(user.last_generated_at)}</td>
    </tr>
  `).join('')
}

async function selectUser(userId) {
  selectedUserId = userId
  renderUsers()
  await loadDetails(userId)
}

async function loadDetails(userId = '') {
  const suffix = userId ? `?userId=${encodeURIComponent(userId)}` : ''
  const [usage, transactions] = await Promise.all([
    request(`/credits/usage${suffix}`),
    request(`/credits/transactions${suffix}`),
  ])
  document.getElementById('usage-title').textContent = userId ? `生成明细：${userId}` : '生成明细'
  document.getElementById('tx-title').textContent = userId ? `积分流水：${userId}` : '积分流水'
  renderUsage(usage)
  renderTransactions(transactions)
}

async function recharge() {
  const body = {
    amount: document.getElementById('r-amount').value,
    note: document.getElementById('r-note').value.trim(),
  }
  if (!body.amount) {
    alert('请填写充值积分')
    return
  }
  document.getElementById('recharge-state').textContent = '正在充值...'
  try {
    const result = await request('/credits/recharge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
    document.getElementById('recharge-state').textContent = `充值成功，当前余额 ${fmtCredit(result.balance)}`
    document.getElementById('r-amount').value = ''
    await loadAll()
  } catch (error) {
    document.getElementById('recharge-state').textContent = error.message
    alert(error.message)
  }
}

function renderUsage(rows) {
  document.getElementById('usage-tbody').innerHTML = rows.map((row) => `
    <tr>
      <td>${fmtTime(row.created_at)}</td>
      <td>${esc(row.user_nickname || row.user_email || row.user_id || '-')}</td>
      <td>${esc(row.model || '-')}</td>
      <td>${esc(row.generation_mode || '-')}</td>
      <td>${esc(row.resolution || '-')}</td>
      <td>${fmtSeconds(row.duration)}</td>
      <td>${Number(row.sample_count || 1)}</td>
      <td>${Number(row.imageCount || 0)}</td>
      <td>${Number(row.videoCount || 0)}</td>
      <td>${esc(row.status || '-')}</td>
      <td>${fmtCredit(row.credit_spent)}</td>
      <td>${esc(row.engine_task_id || '-')}</td>
    </tr>
  `).join('')
}

function renderTransactions(rows) {
  document.getElementById('tx-tbody').innerHTML = rows.map((row) => `
    <tr>
      <td>${fmtTime(row.created_at)}</td>
      <td>${esc(row.user_nickname || row.user_email || row.user_id || '-')}</td>
      <td>${row.type === 'recharge' ? '充值' : '消耗'}</td>
      <td class="${Number(row.amount) >= 0 ? 'text-green-300' : 'text-amber-300'}">${fmtSigned(row.amount)}</td>
      <td>${fmtCredit(row.balance_after)}</td>
      <td>${esc(row.note || '-')}</td>
      <td>${esc(row.created_by || '-')}</td>
    </tr>
  `).join('')
}

function fmtCredit(value) {
  return `${Number(value || 0).toFixed(2)} 积分`
}

function fmtSigned(value) {
  const number = Number(value || 0)
  return `${number > 0 ? '+' : ''}${number.toFixed(2)}`
}

function fmtSeconds(value) {
  const seconds = Number(value || 0)
  return seconds ? `${seconds.toFixed(seconds % 1 ? 1 : 0)} 秒` : '-'
}

function fmtTime(value) {
  if (!value) return '-'
  const date = new Date(value)
  if (Number.isNaN(date.getTime())) return '-'
  return date.toLocaleString('zh-CN', { hour12: false })
}

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]))
}

function escAttr(value) {
  return esc(value).replace(/`/g, '&#96;')
}

if (TOKEN) {
  loadAll().then(() => {
    document.getElementById('login').style.display = 'none'
    document.getElementById('app').style.display = 'block'
  }).catch(showLogin)
} else {
  showLogin()
}
</script>
</body>
</html>
